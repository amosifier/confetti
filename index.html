<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confetti</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #fx-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    button {
      position: relative;
      z-index: 1000;
      padding: 16px 40px;
      font-size: 1.2rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: #000;
      color: #fff;
      border: 2px solid #fff;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: #fff;
      color: #000;
    }
  </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>
<button onclick="sfxWin(); spawnConfetti()">Confetti</button>

<script>
  // ============================================================
  //  AUDIO ENGINE  (Web Audio API — no external files)
  // ============================================================
  let audioCtx = null;

  function audio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function tone(freq, type, dur, vol, t0 = 0) {
    const ctx = audio();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + t0);
    gain.gain.setValueAtTime(vol, ctx.currentTime + t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t0 + dur);
    osc.start(ctx.currentTime + t0);
    osc.stop(ctx.currentTime + t0 + dur + 0.01);
  }

  function sfxWin() {
    const melody = [523.25, 659.25, 783.99, 1046.5, 1318.5];
    melody.forEach((f, i) => tone(f, 'triangle', 0.4, 0.35, i * 0.18));
    // harmony
    [392, 493.88, 587.33].forEach((f, i) => tone(f, 'sine', 0.5, 0.15, i * 0.18 + 0.05));
  }

  // ============================================================
  //  CANVAS PARTICLES
  // ============================================================
  const canvas = document.getElementById('fx-canvas');
  const ctx2d  = canvas.getContext('2d');
  let particles = [];
  let rafId = null;

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function spawnConfetti() {
    const palette = ['#e94560','#2ecc71','#3498db','#f39c12','#9b59b6','#1abc9c','#e74c3c','#f1c40f','#fff'];
    for (let i = 0; i < 150; i++) {
      particles.push({
        x:    Math.random() * canvas.width,
        y:    -20 - Math.random() * 120,
        vx:   (Math.random() - 0.5) * 4,
        vy:   2 + Math.random() * 5,
        size: 7 + Math.random() * 9,
        color: palette[Math.floor(Math.random() * palette.length)],
        life:  1,
        decay: 0.003 + Math.random() * 0.004,
        gravity: 0.06,
        rot:  Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.25,
        type: 'confetti'
      });
    }
    kickParticleLoop();
  }

  function kickParticleLoop() {
    if (!rafId) rafId = requestAnimationFrame(particleLoop);
  }

  function particleLoop() {
    ctx2d.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.life > 0.01);

    for (const p of particles) {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.98;
      p.life -= p.decay;
      if (p.rotSpeed) p.rot += p.rotSpeed;

      ctx2d.save();
      ctx2d.globalAlpha = Math.max(0, p.life);

      ctx2d.translate(p.x, p.y);
      ctx2d.rotate(p.rot);
      ctx2d.fillStyle = p.color;
      ctx2d.fillRect(-p.size / 2, -p.size * 0.35, p.size, p.size * 0.7);

      ctx2d.restore();
    }

    if (particles.length > 0) {
      rafId = requestAnimationFrame(particleLoop);
    } else {
      rafId = null;
    }
  }
</script>
</body>
</html>
